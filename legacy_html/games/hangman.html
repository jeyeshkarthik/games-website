<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hangman — GameZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .hm-wrap { display:flex; gap:40px; align-items:flex-start; flex-wrap:wrap; justify-content:center; width:100%; max-width:700px; }
    .hm-left { display:flex; flex-direction:column; align-items:center; gap:20px; }
    .hm-right { display:flex; flex-direction:column; align-items:center; gap:20px; flex:1; min-width:280px; }
    canvas#hm-canvas { border:2px solid var(--border); border-radius:16px; background:#0a0818; }
    .word-display { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .letter-slot {
      width: 38px; height: 48px;
      border-bottom: 3px solid var(--border-hover);
      display:flex; align-items:flex-end; justify-content:center;
      font-size:24px; font-weight:800; text-transform:uppercase;
      color:var(--text); padding-bottom:4px;
      transition:all 0.3s;
    }
    .letter-slot.revealed { border-color:#7c3aed; color:#c4b5fd; }
    .letter-slot.wrong { border-color:#ef4444; }
    .hint-box {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:12px 20px; font-size:13px;
      color:var(--text-muted); text-align:center;
    }
    .hint-box strong { color:var(--text); }
    .keyboard-hm { display:flex; flex-direction:column; gap:6px; width:100%; }
    .kb-row-hm { display:flex; gap:5px; justify-content:center; }
    .hm-key {
      width:38px; height:42px; border-radius:8px;
      background:var(--surface); border:1px solid var(--border);
      color:var(--text); font-family:var(--font); font-size:14px; font-weight:700;
      cursor:pointer; transition:all 0.15s; text-transform:uppercase;
    }
    .hm-key:hover:not(:disabled) { background:var(--surface-hover); border-color:var(--border-hover); }
    .hm-key:disabled { opacity:0.3; cursor:default; }
    .hm-key.correct-key { background:rgba(16,185,129,0.2); border-color:#10b981; color:#10b981; }
    .hm-key.wrong-key   { background:rgba(239,68,68,0.1); border-color:#ef4444; color:#ef4444; }
    .wrong-count {
      font-size:36px; font-weight:900;
      background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .cat-btn { padding:8px 16px; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; font-family:var(--font); font-size:12px; font-weight:600; transition:all 0.2s; }
    .cat-btn.active { background:var(--gradient); color:#fff; border-color:transparent; }
    .cat-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="game-page">
    <div class="game-header">
      <a href="../index.html" class="back-btn">← Back</a>
      <div class="game-title-wrap">
        <h1>🪢 Hangman</h1>
        <p>Guess the word before it's too late!</p>
      </div>
      <div class="score-display">
        <div class="score-box"><span class="s-label">Wins</span><span class="s-val" id="wins">0</span></div>
        <div class="score-box"><span class="s-label">Losses</span><span class="s-val" id="losses">0</span></div>
      </div>
    </div>

    <div class="cat-row" style="margin-bottom:16px">
      <button class="cat-btn active" onclick="setCat('animals')">🐾 Animals</button>
      <button class="cat-btn" onclick="setCat('countries')">🌍 Countries</button>
      <button class="cat-btn" onclick="setCat('food')">🍕 Food</button>
      <button class="cat-btn" onclick="setCat('tech')">💻 Tech</button>
      <button class="cat-btn" onclick="setCat('sports')">⚽ Sports</button>
    </div>

    <div class="status-msg" id="status">Guess the word!</div>

    <div class="hm-wrap">
      <div class="hm-left">
        <canvas id="hm-canvas" width="200" height="220"></canvas>
        <div>
          <div style="text-align:center;font-size:13px;color:var(--text-muted)">Wrong guesses</div>
          <div class="wrong-count" id="wrong">0/6</div>
        </div>
      </div>
      <div class="hm-right">
        <div class="hint-box" id="hint-box">Category: <strong id="cat-label">Animals</strong></div>
        <div class="word-display" id="word-display"></div>
        <div class="keyboard-hm" id="hm-keyboard"></div>
        <button class="btn btn-primary" onclick="newGame()">New Word</button>
      </div>
    </div>
  </div>

  <script>
    const WORDS_DB = {
      animals: ['elephant','giraffe','penguin','dolphin','butterfly','crocodile','flamingo','cheetah','gorilla','kangaroo','platypus','chameleon'],
      countries: ['australia','brazil','canada','denmark','ethiopia','finland','germany','hungary','iceland','jamaica','portugal','thailand'],
      food: ['avocado','broccoli','chocolate','dumpling','eggplant','falafel','guacamole','hamburger','icecream','jellybean','pizza','sushi'],
      tech: ['algorithm','bluetooth','compiler','database','ethernet','framework','github','hardware','internet','javascript','keyboard','laptop'],
      sports: ['basketball','cricket','football','gymnastics','handball','javelin','karate','lacrosse','marathon','netball','olympics','volleyball']
    };

    const canvas=document.getElementById('hm-canvas');
    const ctx=canvas.getContext('2d');
    let word, guessed, wrong, maxWrong=6, gameOver=false, cat='animals', stats={wins:0,losses:0};

    function setCat(c) {
      cat=c;
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('cat-label').textContent=event.target.textContent;
      newGame();
    }

    function newGame() {
      const words=WORDS_DB[cat];
      word=words[Math.floor(Math.random()*words.length)].toUpperCase();
      guessed=new Set(); wrong=0; gameOver=false;
      document.getElementById('status').textContent='Guess the word!';
      document.getElementById('status').className='status-msg';
      document.getElementById('wrong').textContent='0/6';
      buildWordDisplay(); buildKeyboard(); drawGallows(0);
    }

    function buildWordDisplay() {
      const el=document.getElementById('word-display');
      el.innerHTML='';
      word.split('').forEach(l=>{
        const slot=document.createElement('div');
        slot.className='letter-slot'+(guessed.has(l)?' revealed':'');
        slot.id='slot-'+l+'-'+[...word].indexOf(l);
        slot.textContent=guessed.has(l)?l:'';
        el.appendChild(slot);
      });
      // Re-render all
      el.innerHTML='';
      word.split('').forEach((l,i)=>{
        const slot=document.createElement('div');
        slot.className='letter-slot'+(guessed.has(l)?' revealed':'');
        slot.id=`slot-${i}`;
        slot.textContent=guessed.has(l)?l:'';
        el.appendChild(slot);
      });
    }

    function buildKeyboard() {
      const rows=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];
      const kb=document.getElementById('hm-keyboard');
      kb.innerHTML='';
      rows.forEach(row=>{
        const rowEl=document.createElement('div');
        rowEl.className='kb-row-hm';
        row.forEach(k=>{
          const btn=document.createElement('button');
          btn.textContent=k; btn.className='hm-key'; btn.id='hk-'+k;
          btn.onclick=()=>guess(k);
          rowEl.appendChild(btn);
        });
        kb.appendChild(rowEl);
      });
    }

    function guess(l) {
      if(gameOver||guessed.has(l)) return;
      guessed.add(l);
      const btn=document.getElementById('hk-'+l);
      if(word.includes(l)) {
        btn.className='hm-key correct-key'; btn.disabled=true;
        // Reveal letters
        word.split('').forEach((wl,i)=>{
          if(wl===l) {
            const slot=document.getElementById(`slot-${i}`);
            slot.textContent=l; slot.className='letter-slot revealed';
          }
        });
        if([...word].every(c=>guessed.has(c))) winGame();
      } else {
        wrong++;
        btn.className='hm-key wrong-key'; btn.disabled=true;
        document.getElementById('wrong').textContent=`${wrong}/6`;
        drawGallows(wrong);
        if(wrong>=maxWrong) loseGame();
      }
    }

    function winGame() {
      gameOver=true; stats.wins++;
      document.getElementById('wins').textContent=stats.wins;
      const s=document.getElementById('status');
      s.textContent='🎉 You got it!'; s.className='status-msg status-win';
    }

    function loseGame() {
      gameOver=true; stats.losses++;
      document.getElementById('losses').textContent=stats.losses;
      // Reveal word
      word.split('').forEach((l,i)=>{
        const slot=document.getElementById(`slot-${i}`);
        slot.textContent=l; slot.className='letter-slot wrong';
      });
      const s=document.getElementById('status');
      s.textContent=`😞 The word was: ${word}`; s.className='status-msg status-lose';
    }

    function drawGallows(step) {
      ctx.clearRect(0,0,200,220);
      ctx.strokeStyle='rgba(255,255,255,0.7)';
      ctx.lineWidth=3; ctx.lineCap='round';
      // Base
      ctx.beginPath(); ctx.moveTo(20,200); ctx.lineTo(180,200); ctx.stroke();
      // Pole
      ctx.beginPath(); ctx.moveTo(60,200); ctx.lineTo(60,20); ctx.stroke();
      // Top
      ctx.beginPath(); ctx.moveTo(60,20); ctx.lineTo(130,20); ctx.stroke();
      // Rope
      ctx.beginPath(); ctx.moveTo(130,20); ctx.lineTo(130,50); ctx.stroke();

      if(step<1) return;
      // Head
      ctx.strokeStyle='#ef4444';
      ctx.beginPath(); ctx.arc(130,65,16,0,Math.PI*2); ctx.stroke();
      if(step<2) return;
      // Body
      ctx.beginPath(); ctx.moveTo(130,81); ctx.lineTo(130,130); ctx.stroke();
      if(step<3) return;
      // Left arm
      ctx.beginPath(); ctx.moveTo(130,95); ctx.lineTo(100,115); ctx.stroke();
      if(step<4) return;
      // Right arm
      ctx.beginPath(); ctx.moveTo(130,95); ctx.lineTo(160,115); ctx.stroke();
      if(step<5) return;
      // Left leg
      ctx.beginPath(); ctx.moveTo(130,130); ctx.lineTo(105,165); ctx.stroke();
      if(step<6) return;
      // Right leg
      ctx.beginPath(); ctx.moveTo(130,130); ctx.lineTo(155,165); ctx.stroke();
      // Eyes X
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(124,60); ctx.lineTo(128,64); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(128,60); ctx.lineTo(124,64); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(133,60); ctx.lineTo(137,64); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(137,60); ctx.lineTo(133,64); ctx.stroke();
    }

    document.addEventListener('keydown',e=>{
      if(/^[a-zA-Z]$/.test(e.key)) guess(e.key.toUpperCase());
    });

    newGame();
  </script>
</body>
</html>
