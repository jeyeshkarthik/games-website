<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors — GameZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .rps-arena {
      display: flex; align-items: center; justify-content: center; gap: 32px;
      margin: 32px 0;
    }
    .side { text-align:center; }
    .side-label { font-size:13px; color:var(--text-muted); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
    .choice-display {
      width: 120px; height: 120px;
      border-radius: 24px;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex; align-items:center; justify-content:center;
      font-size: 56px;
      transition: all 0.3s;
    }
    .choice-display.win { border-color:#10b981; background:rgba(16,185,129,0.12); box-shadow:0 0 20px rgba(16,185,129,0.2); }
    .choice-display.lose { border-color:#ef4444; background:rgba(239,68,68,0.12); }
    .choice-display.draw { border-color:#f59e0b; background:rgba(245,158,11,0.12); }
    .vs-text { font-size: 28px; font-weight: 900; color:var(--text-muted); }
    .choices {
      display: flex; gap: 16px; justify-content: center;
      margin: 16px 0 32px;
    }
    .choice-btn {
      width: 90px; height: 90px;
      border-radius: 20px;
      background: var(--surface); border: 2px solid var(--border);
      font-size: 44px; cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    }
    .choice-btn:hover { background:var(--surface-hover); border-color:var(--border-hover); transform:scale(1.12) translateY(-4px); }
    .choice-btn:active { transform:scale(0.95); }
    .history {
      width:100%; max-width:400px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:16px;
    }
    .history h4 { font-size:12px; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); margin-bottom:12px; }
    .hist-list { display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; }
    .hist-item { display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:6px 0; border-bottom:1px solid var(--border); }
    .hist-result { font-weight:700; }
    .hist-result.W { color:#10b981; }
    .hist-result.L { color:#ef4444; }
    .hist-result.D { color:#f59e0b; }
    .streak { background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.3); border-radius:100px; padding:6px 16px; font-size:13px; }
    .ai-msg {
      font-size:13px; color:var(--text-muted);
      font-style:italic; text-align:center; margin:8px 0;
      min-height:20px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="game-page">
    <div class="game-header">
      <a href="../index.html" class="back-btn">← Back</a>
      <div class="game-title-wrap">
        <h1>✊ Rock Paper Scissors</h1>
        <p>The bot learns your patterns!</p>
      </div>
      <div class="score-display">
        <div class="score-box"><span class="s-label">You</span><span class="s-val" id="sc-p">0</span></div>
        <div class="score-box"><span class="s-label">Bot</span><span class="s-val" id="sc-b">0</span></div>
        <div class="score-box"><span class="s-label">Tie</span><span class="s-val" id="sc-d">0</span></div>
      </div>
    </div>

    <div class="status-msg" id="status">Make your choice!</div>
    <div class="ai-msg" id="ai-msg"></div>

    <div class="rps-arena">
      <div class="side">
        <div class="side-label">You</div>
        <div class="choice-display" id="p-display">❓</div>
      </div>
      <div class="vs-text">VS</div>
      <div class="side">
        <div class="side-label">🤖 Bot</div>
        <div class="choice-display" id="b-display">❓</div>
      </div>
    </div>

    <div class="choices">
      <button class="choice-btn" id="btn-rock" onclick="play('rock')" title="Rock">✊</button>
      <button class="choice-btn" id="btn-paper" onclick="play('paper')" title="Paper">✋</button>
      <button class="choice-btn" id="btn-scissors" onclick="play('scissors')" title="Scissors">✌️</button>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <span class="streak" id="streak">🔥 Streak: 0</span>
      <button class="btn btn-secondary" onclick="resetGame()">Reset</button>
    </div>

    <div class="history">
      <h4>Round History</h4>
      <div class="hist-list" id="hist-list">
        <div style="color:var(--text-muted);font-size:13px">No rounds played yet...</div>
      </div>
    </div>
  </div>

  <script>
    const CHOICES = ['rock','paper','scissors'];
    const EMOJI = {rock:'✊', paper:'✋', scissors:'✌️'};
    const BEATS = {rock:'scissors', scissors:'paper', paper:'rock'};
    const AI_MSGS = {
      win: ["I see through you! 🧠","Predictable! 😏","Pattern detected!","Too easy, human!"],
      lose: ["Lucky!","Good move...","I'll adapt!","You got me this time!"],
      draw: ["Mirror match!","Same mind!","Interesting...","We think alike!"]
    };
    let scores={p:0,b:0,d:0}, history=[], streak=0, botHistory=[];

    function botChoice() {
      if (botHistory.length < 3 || Math.random() < 0.3) return CHOICES[Math.floor(Math.random()*3)];
      // Pattern prediction: find what player plays after last 2 moves
      const last2 = history.slice(-2).map(h=>h.player).join(',');
      const pattern = {};
      for (let i=1;i<history.length-1;i++) {
        const seq = [history[i-1].player, history[i].player].join(',');
        if (seq === last2 && history[i+1]) {
          const next = history[i+1].player;
          pattern[next] = (pattern[next]||0)+1;
        }
      }
      if (Object.keys(pattern).length) {
        const predicted = Object.keys(pattern).sort((a,b)=>pattern[b]-pattern[a])[0];
        return Object.keys(BEATS).find(k=>BEATS[k]===predicted);
      }
      // Frequency-based: counter most frequent
      const freq = {};
      history.forEach(h=>freq[h.player]=(freq[h.player]||0)+1);
      const mostFreq = Object.keys(freq).sort((a,b)=>freq[b]-freq[a])[0];
      return Object.keys(BEATS).find(k=>BEATS[k]===mostFreq) || CHOICES[Math.floor(Math.random()*3)];
    }

    function play(p) {
      const b = botChoice();
      const pd=document.getElementById('p-display'), bd=document.getElementById('b-display');
      const st=document.getElementById('status');
      // Animate
      pd.textContent='🌀'; bd.textContent='🌀';
      pd.className='choice-display'; bd.className='choice-display';
      setTimeout(()=>{
        pd.textContent=EMOJI[p]; bd.textContent=EMOJI[b];
        let res, cls, streakDir=0;
        if(p===b){res='draw';cls='draw';scores.d++;streak=0;}
        else if(BEATS[p]===b){res='win';cls='win';scores.p++;streak++;streakDir=1;}
        else{res='lose';cls='lose';scores.b++;streak=0;}
        pd.classList.add(res==='win'?'win':res==='lose'?'lose':'draw');
        bd.classList.add(res==='lose'?'win':res==='win'?'lose':'draw');
        st.textContent = res==='win'?'🎉 You win this round!':res==='lose'?'🤖 Bot wins!':'🤝 Tie!';
        st.className='status-msg '+(res==='win'?'status-win':res==='lose'?'status-lose':'status-draw');
        const msg=AI_MSGS[res]; document.getElementById('ai-msg').textContent=`"${msg[Math.floor(Math.random()*msg.length)]}"`;
        document.getElementById('streak').textContent=`🔥 Streak: ${streak}`;
        updateScores();
        const entry={player:p,bot:b,result:res};
        history.push(entry);
        addHistory(entry);
      },400);
    }

    function addHistory(entry) {
      const list=document.getElementById('hist-list');
      if(list.children[0]?.style?.color) list.innerHTML='';
      const item=document.createElement('div');
      item.className='hist-item';
      const rMap={win:'W',lose:'L',draw:'D'};
      item.innerHTML=`<span>${EMOJI[entry.player]} vs ${EMOJI[entry.bot]}</span><span class="hist-result ${rMap[entry.result]}">${entry.result.toUpperCase()}</span>`;
      list.insertBefore(item,list.firstChild);
      if(list.children.length>10) list.removeChild(list.lastChild);
    }

    function updateScores() {
      document.getElementById('sc-p').textContent=scores.p;
      document.getElementById('sc-b').textContent=scores.b;
      document.getElementById('sc-d').textContent=scores.d;
    }

    function resetGame() {
      scores={p:0,b:0,d:0}; history=[]; streak=0;
      updateScores();
      document.getElementById('p-display').textContent='❓';
      document.getElementById('b-display').textContent='❓';
      document.getElementById('p-display').className='choice-display';
      document.getElementById('b-display').className='choice-display';
      document.getElementById('status').textContent='Make your choice!';
      document.getElementById('status').className='status-msg';
      document.getElementById('ai-msg').textContent='';
      document.getElementById('streak').textContent='🔥 Streak: 0';
      document.getElementById('hist-list').innerHTML='<div style="color:var(--text-muted);font-size:13px">No rounds played yet...</div>';
    }
  </script>
</body>
</html>
