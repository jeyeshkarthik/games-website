<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe — GameZone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .ttt-board {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 12px;
      width: 100%; max-width: 360px;
      margin: 24px auto;
    }
    .ttt-cell {
      aspect-ratio: 1;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 56px; font-weight: 900;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
      user-select: none;
    }
    .ttt-cell:hover:not(.taken) {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: scale(1.05);
    }
    .ttt-cell.X { color: #7c3aed; border-color: rgba(124,58,237,0.4); }
    .ttt-cell.O { color: #06b6d4; border-color: rgba(6,182,212,0.4); }
    .ttt-cell.win-cell {
      background: rgba(16,185,129,0.12);
      border-color: #10b981;
      animation: winPulse 0.6s ease;
    }
    @keyframes winPulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    .difficulty-bar {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 24px;
    }
    .diff-btn {
      padding: 8px 20px; border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted);
      cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600;
      transition: all 0.2s;
    }
    .diff-btn.active { background: var(--gradient); color: #fff; border-color: transparent; }
    .controls { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
    .turn-indicator {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-bottom: 16px;
    }
    .player-tag {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 20px; border-radius: 100px;
      border: 1px solid var(--border);
      font-size: 14px; font-weight: 600;
      transition: all 0.3s;
    }
    .player-tag.active { border-color: rgba(124,58,237,0.5); background: rgba(124,58,237,0.1); }
    .player-tag.bot.active { border-color: rgba(6,182,212,0.5); background: rgba(6,182,212,0.1); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="game-page">
    <div class="game-header">
      <a href="../index.html" class="back-btn">← Back</a>
      <div class="game-title-wrap">
        <h1>⭕ Tic Tac Toe</h1>
        <p>You vs Minimax Bot</p>
      </div>
      <div class="score-display">
        <div class="score-box"><span class="s-label">You</span><span class="s-val" id="score-player">0</span></div>
        <div class="score-box"><span class="s-label">Bot</span><span class="s-val" id="score-bot">0</span></div>
        <div class="score-box"><span class="s-label">Draws</span><span class="s-val" id="score-draw">0</span></div>
      </div>
    </div>

    <div class="difficulty-bar">
      <button class="diff-btn" onclick="setDiff('easy')">Easy</button>
      <button class="diff-btn active" onclick="setDiff('medium')">Medium</button>
      <button class="diff-btn" onclick="setDiff('hard')">Hard</button>
    </div>

    <div class="turn-indicator">
      <div class="player-tag active" id="tag-player">✖ You</div>
      <div class="player-tag bot" id="tag-bot">🤖 Bot</div>
    </div>

    <div class="status-msg" id="status">Your turn — play X</div>

    <div class="ttt-board" id="board">
      <div class="ttt-cell" id="c0" onclick="playerMove(0)"></div>
      <div class="ttt-cell" id="c1" onclick="playerMove(1)"></div>
      <div class="ttt-cell" id="c2" onclick="playerMove(2)"></div>
      <div class="ttt-cell" id="c3" onclick="playerMove(3)"></div>
      <div class="ttt-cell" id="c4" onclick="playerMove(4)"></div>
      <div class="ttt-cell" id="c5" onclick="playerMove(5)"></div>
      <div class="ttt-cell" id="c6" onclick="playerMove(6)"></div>
      <div class="ttt-cell" id="c7" onclick="playerMove(7)"></div>
      <div class="ttt-cell" id="c8" onclick="playerMove(8)"></div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" onclick="resetGame()">New Game</button>
    </div>
  </div>

  <script>
    let board = Array(9).fill(null);
    let gameOver = false;
    let difficulty = 'medium';
    let scores = { player: 0, bot: 0, draw: 0 };
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function setDiff(d) {
      difficulty = d;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      resetGame();
    }

    function playerMove(i) {
      if (gameOver || board[i]) return;
      board[i] = 'X';
      render();
      const result = checkWin(board);
      if (result) { endGame(result); return; }
      setTurn(false);
      setTimeout(botMove, 400);
    }

    function botMove() {
      if (gameOver) return;
      let move;
      if (difficulty === 'easy') move = randomMove();
      else if (difficulty === 'medium') move = Math.random() < 0.5 ? minimaxMove() : randomMove();
      else move = minimaxMove();
      if (move === undefined) return;
      board[move] = 'O';
      render();
      const result = checkWin(board);
      if (result) { endGame(result); return; }
      setTurn(true);
    }

    function randomMove() {
      const empty = board.map((v,i) => v ? null : i).filter(v => v !== null);
      return empty[Math.floor(Math.random() * empty.length)];
    }

    function minimaxMove() {
      let best = -Infinity, move;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; move = i; }
        }
      });
      return move;
    }

    function minimax(b, depth, isMax) {
      const result = checkWin(b);
      if (result === 'O') return 10 - depth;
      if (result === 'X') return depth - 10;
      if (result === 'draw') return 0;
      if (isMax) {
        let best = -Infinity;
        b.forEach((v,i) => { if (!v) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; } });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v,i) => { if (!v) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; } });
        return best;
      }
    }

    function checkWin(b) {
      for (const [a,c,d] of wins) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
      }
      if (b.every(v => v)) return 'draw';
      return null;
    }

    function endGame(result) {
      gameOver = true;
      const status = document.getElementById('status');
      if (result === 'X') {
        scores.player++;
        status.textContent = '🎉 You win!';
        status.className = 'status-msg status-win';
        highlightWin('X');
      } else if (result === 'O') {
        scores.bot++;
        status.textContent = '🤖 Bot wins!';
        status.className = 'status-msg status-lose';
        highlightWin('O');
      } else {
        scores.draw++;
        status.textContent = "🤝 It's a draw!";
        status.className = 'status-msg status-draw';
      }
      updateScores();
    }

    function highlightWin(player) {
      for (const combo of wins) {
        if (combo.every(i => board[i] === player)) {
          combo.forEach(i => document.getElementById(`c${i}`).classList.add('win-cell'));
          return;
        }
      }
    }

    function render() {
      board.forEach((v, i) => {
        const cell = document.getElementById(`c${i}`);
        cell.textContent = v === 'X' ? '✖' : v === 'O' ? '◯' : '';
        cell.className = 'ttt-cell' + (v ? ' taken ' + v : '');
      });
    }

    function setTurn(isPlayer) {
      document.getElementById('tag-player').className = 'player-tag' + (isPlayer ? ' active' : '');
      document.getElementById('tag-bot').className = 'player-tag bot' + (!isPlayer ? ' active' : '');
      document.getElementById('status').textContent = isPlayer ? 'Your turn — play X' : '🤖 Bot is thinking...';
      document.getElementById('status').className = 'status-msg';
    }

    function updateScores() {
      document.getElementById('score-player').textContent = scores.player;
      document.getElementById('score-bot').textContent = scores.bot;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    function resetGame() {
      board = Array(9).fill(null);
      gameOver = false;
      render();
      setTurn(true);
    }

    resetGame();
  </script>
</body>
</html>
