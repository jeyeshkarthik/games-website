<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordle — GameZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .wordle-grid {
      display: grid; grid-template-rows: repeat(6,1fr);
      gap: 8px; margin: 20px auto; max-width: 340px; width: 100%;
    }
    .w-row { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    .w-tile {
      aspect-ratio:1; border-radius:10px;
      border: 2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; font-weight:800; text-transform:uppercase;
      transition: all 0.1s;
    }
    .w-tile.filled { border-color: var(--border-hover); animation: tilePop 0.1s ease; }
    @keyframes tilePop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .w-tile.correct { background:#16a34a; border-color:#16a34a; color:#fff; animation: flipIn 0.4s ease; }
    .w-tile.present { background:#b45309; border-color:#b45309; color:#fff; animation: flipIn 0.4s ease; }
    .w-tile.absent  { background:#374151; border-color:#374151; color:#fff; animation: flipIn 0.4s ease; }
    @keyframes flipIn { 0%{transform:rotateX(90deg)} 100%{transform:rotateX(0)} }
    .w-tile.shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .keyboard {
      display:flex; flex-direction:column; gap:8px; max-width:480px; width:100%;
    }
    .kb-row { display:flex; gap:6px; justify-content:center; }
    .kb-key {
      height:54px; min-width:38px; padding:0 8px;
      border-radius: 8px; background:var(--surface); border:1px solid var(--border);
      color:var(--text); font-family:var(--font); font-size:14px; font-weight:700;
      cursor:pointer; transition:all 0.15s; text-transform:uppercase;
      display:flex; align-items:center; justify-content:center;
    }
    .kb-key.wide { min-width:64px; font-size:12px; }
    .kb-key:hover { background:var(--surface-hover); }
    .kb-key:active { transform:scale(0.92); }
    .kb-key.correct { background:#16a34a; border-color:#16a34a; }
    .kb-key.present { background:#b45309; border-color:#b45309; }
    .kb-key.absent  { background:#374151; border-color:#374151; }
    .word-reveal { font-size:14px; color:var(--text-muted); margin:8px 0; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="game-page">
    <div class="game-header">
      <a href="../index.html" class="back-btn">← Back</a>
      <div class="game-title-wrap">
        <h1>📝 Wordle</h1>
        <p>Guess the 5-letter word in 6 tries</p>
      </div>
      <div class="score-display">
        <div class="score-box"><span class="s-label">Wins</span><span class="s-val" id="wins">0</span></div>
        <div class="score-box"><span class="s-label">Streak</span><span class="s-val" id="streak">0</span></div>
      </div>
    </div>

    <div class="status-msg" id="status">Type a 5-letter word and press Enter</div>
    <div class="word-reveal" id="word-reveal"></div>

    <div class="wordle-grid" id="grid"></div>

    <div class="keyboard" id="keyboard">
      <div class="kb-row" id="kb-r1"></div>
      <div class="kb-row" id="kb-r2"></div>
      <div class="kb-row" id="kb-r3"></div>
    </div>

    <button class="btn btn-primary" style="margin-top:24px" onclick="newGame()">New Word</button>
  </div>

  <script>
    const WORDS = ['crane','slate','stare','trace','crate','arise','raise','store','score','adore','blaze','brave','clove','drove','flare','glare','grace','grape','grave','graze','prove','weave','leave','heave','above','shale','shade','share','shore','shame','shape','shake','shave','spare','spade','space','phase','place','plane','plate','plane','frame','flame','flake','flare','drake','drape','brave','crave','grave','stove','grove','trove','shove','clue','clove','alone','clone','phone','stone','smoke','spoke','stoke','elope','slope','evoke','broke','stale','scale','scone','shine','shire','snide','bride','pride','grind','blind','climb','cling','bring','swing','thing','drink','drink','brine','whine','while','whale','shale','snare','share','spare','stare','blare','glare','flare','flare','place','grace','grace','trace','brace','space'];

    let target, current=[], guesses=[], row=0, gameOver=false, stats={wins:0,streak:0};
    const KEYS=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['Enter','z','x','c','v','b','n','m','⌫']];

    function newGame() {
      target = WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
      current=[]; guesses=[]; row=0; gameOver=false;
      document.getElementById('word-reveal').textContent='';
      document.getElementById('status').textContent='Type a 5-letter word and press Enter';
      document.getElementById('status').className='status-msg';
      buildGrid(); buildKeyboard();
    }

    function buildGrid() {
      const grid=document.getElementById('grid');
      grid.innerHTML='';
      for(let r=0;r<6;r++) {
        const row=document.createElement('div');
        row.className='w-row'; row.id='row-'+r;
        for(let c=0;c<5;c++) {
          const tile=document.createElement('div');
          tile.className='w-tile'; tile.id=`t-${r}-${c}`;
          row.appendChild(tile);
        }
        grid.appendChild(row);
      }
    }

    function buildKeyboard() {
      ['kb-r1','kb-r2','kb-r3'].forEach((id,i)=>{
        const el=document.getElementById(id);
        el.innerHTML='';
        KEYS[i].forEach(key=>{
          const btn=document.createElement('button');
          btn.className='kb-key'+(key.length>1?' wide':'');
          btn.textContent=key; btn.id='key-'+key;
          btn.onclick=()=>handleKey(key);
          el.appendChild(btn);
        });
      });
    }

    function handleKey(key) {
      if(gameOver) return;
      if(key==='⌫'||key==='Backspace') { current.pop(); }
      else if(key==='Enter') { submitGuess(); return; }
      else if(current.length<5 && /^[a-zA-Z]$/.test(key)) { current.push(key.toUpperCase()); }
      updateRow();
    }

    function updateRow() {
      for(let c=0;c<5;c++) {
        const tile=document.getElementById(`t-${row}-${c}`);
        tile.textContent=current[c]||'';
        tile.className='w-tile'+(current[c]?' filled':'');
      }
    }

    function submitGuess() {
      if(current.length!==5) {
        shakeRow(); return;
      }
      const guess=current.join('');
      guesses.push(guess);
      revealRow(guess);
      if(guess===target) {
        stats.wins++; stats.streak++;
        document.getElementById('wins').textContent=stats.wins;
        document.getElementById('streak').textContent=stats.streak;
        setTimeout(()=>{
          const s=document.getElementById('status');
          s.textContent='🎉 Brilliant! You got it!'; s.className='status-msg status-win';
        }, 1600);
        gameOver=true;
      } else if(guesses.length===6) {
        stats.streak=0;
        setTimeout(()=>{
          const s=document.getElementById('status');
          s.textContent=`😞 The word was: ${target}`; s.className='status-msg status-lose';
          document.getElementById('word-reveal').textContent='Better luck next time!';
        }, 1600);
        gameOver=true;
      }
      row++; current=[];
    }

    function revealRow(guess) {
      const result=Array(5).fill('absent');
      const targetArr=target.split('');
      const guessArr=guess.split('');
      // Mark correct
      guessArr.forEach((l,i)=>{if(l===targetArr[i]){result[i]='correct';targetArr[i]=null;guessArr[i]=null;}});
      // Mark present
      guessArr.forEach((l,i)=>{
        if(l&&targetArr.includes(l)){result[i]='present';targetArr[targetArr.indexOf(l)]=null;}
      });
      result.forEach((res,i)=>{
        setTimeout(()=>{
          const tile=document.getElementById(`t-${row}-${i}`);
          tile.className=`w-tile ${res}`;
          // Update keyboard
          const key=document.getElementById('key-'+guess[i]);
          if(key){
            const cur=key.className;
            if(!cur.includes('correct')) {
              if(res==='correct') key.className='kb-key correct';
              else if(res==='present'&&!cur.includes('present')) key.className='kb-key present';
              else if(res==='absent'&&!cur.includes('present')&&!cur.includes('correct')) key.className='kb-key absent';
            }
          }
        }, i*200);
      });
    }

    function shakeRow() {
      const rowEl=document.getElementById('row-'+row);
      rowEl.querySelectorAll('.w-tile').forEach(t=>{
        t.classList.remove('shake');
        void t.offsetWidth;
        t.classList.add('shake');
      });
    }

    document.addEventListener('keydown',e=>{
      if(e.key==='Backspace') handleKey('⌫');
      else if(e.key==='Enter') handleKey('Enter');
      else if(/^[a-zA-Z]$/.test(e.key)) handleKey(e.key);
    });

    newGame();
  </script>
</body>
</html>
