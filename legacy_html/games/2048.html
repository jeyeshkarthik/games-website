<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 — GameZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .board-2048 {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 10px; padding: 14px;
      background: #1a1030;
      border-radius: 18px;
      border: 2px solid var(--border);
      width: 100%; max-width: 380px;
      user-select: none;
    }
    .tile {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex; align-items:center; justify-content:center;
      font-weight: 800; font-size: 22px;
      transition: all 0.12s;
    }
    .tile-0 { background: rgba(255,255,255,0.04); }
    .tile-2    { background:#2d1b6e; color:#c4b5fd; }
    .tile-4    { background:#3b2080; color:#c4b5fd; }
    .tile-8    { background:#7c3aed; color:#fff; }
    .tile-16   { background:#6d28d9; color:#fff; }
    .tile-32   { background:#5b21b6; color:#fff; }
    .tile-64   { background:#f97316; color:#fff; font-size:18px; }
    .tile-128  { background:#f59e0b; color:#fff; font-size:16px; }
    .tile-256  { background:#eab308; color:#fff; font-size:16px; }
    .tile-512  { background:#84cc16; color:#fff; font-size:16px; }
    .tile-1024 { background:#10b981; color:#fff; font-size:14px; }
    .tile-2048 { background:linear-gradient(135deg,#7c3aed,#f59e0b); color:#fff; font-size:14px; box-shadow:0 0 30px rgba(124,58,237,0.6); }
    .tile-big  { background:linear-gradient(135deg,#06b6d4,#7c3aed); color:#fff; font-size:12px; }
    .d-controls { display:grid; grid-template-areas:". u ." "l . r" ". d ."; grid-template-columns:repeat(3,52px); grid-template-rows:repeat(3,52px); gap:6px; }
    .dc-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .dc-btn:active { background:var(--surface-hover); transform:scale(0.9); }
    .dc-btn.up{grid-area:u} .dc-btn.down{grid-area:d} .dc-btn.left{grid-area:l} .dc-btn.right{grid-area:r}
    .game-info { display:flex; gap:16px; margin:20px 0; }
    @keyframes pop { 0%{transform:scale(0)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
    .tile-new { animation: pop 0.2s ease; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="game-page">
    <div class="game-header">
      <a href="../index.html" class="back-btn">← Back</a>
      <div class="game-title-wrap">
        <h1>🔢 2048</h1>
        <p>Merge tiles — reach 2048!</p>
      </div>
      <div class="score-display">
        <div class="score-box"><span class="s-label">Score</span><span class="s-val" id="sc">0</span></div>
        <div class="score-box"><span class="s-label">Best</span><span class="s-val" id="best">0</span></div>
      </div>
    </div>

    <div class="status-msg" id="status">Swipe or use arrow keys to merge tiles!</div>

    <div class="board-2048" id="board"></div>

    <div class="d-controls" style="margin:20px 0">
      <button class="dc-btn up" onclick="move('up')">▲</button>
      <button class="dc-btn left" onclick="move('left')">◀</button>
      <button class="dc-btn right" onclick="move('right')">▶</button>
      <button class="dc-btn down" onclick="move('down')">▼</button>
    </div>

    <button class="btn btn-primary" onclick="initGame()">New Game</button>
  </div>

  <script>
    let grid, score=0, best=parseInt(localStorage.getItem('2048best')||'0');

    function initGame() {
      grid = Array.from({length:4},()=>Array(4).fill(0));
      score=0; updateScore();
      addTile(); addTile();
      render();
      document.getElementById('status').textContent='Swipe or use arrow keys to merge tiles!';
      document.getElementById('status').className='status-msg';
    }

    function addTile() {
      const empty=[];
      grid.forEach((row,r)=>row.forEach((v,c)=>{if(!v)empty.push([r,c]);}));
      if(!empty.length) return;
      const [r,c]=empty[Math.floor(Math.random()*empty.length)];
      grid[r][c]=Math.random()<0.9?2:4;
    }

    function render() {
      const board=document.getElementById('board');
      board.innerHTML='';
      grid.forEach(row=>row.forEach(val=>{
        const t=document.createElement('div');
        const cls = val>=2048?'tile-2048':val>2048?'tile-big':`tile-${val}`;
        t.className=`tile ${cls}`;
        t.textContent=val||'';
        board.appendChild(t);
      }));
    }

    function move(dir) {
      const prev=JSON.stringify(grid);
      let gained=0;
      if(dir==='left'||dir==='right') {
        grid=grid.map(row=>{
          const res=slide(dir==='right'?row.slice().reverse():row);
          gained+=res.score;
          return dir==='right'?res.row.reverse():res.row;
        });
      } else {
        const cols=Array.from({length:4},(_,c)=>grid.map(r=>r[c]));
        const moved=cols.map(col=>{
          const res=slide(dir==='down'?col.slice().reverse():col);
          gained+=res.score;
          return dir==='down'?res.row.reverse():res.row;
        });
        grid=grid.map((r,ri)=>r.map((_,ci)=>moved[ci][ri]));
      }
      score+=gained;
      if(JSON.stringify(grid)!==prev) { addTile(); render(); updateScore(); }
      checkEnd();
    }

    function slide(row) {
      let filtered=row.filter(v=>v), score=0, newRow=[];
      for(let i=0;i<filtered.length;i++) {
        if(i+1<filtered.length && filtered[i]===filtered[i+1]) {
          newRow.push(filtered[i]*2); score+=filtered[i]*2; i++;
        } else { newRow.push(filtered[i]); }
      }
      while(newRow.length<4) newRow.push(0);
      return {row:newRow, score};
    }

    function updateScore() {
      if(score>best){best=score;localStorage.setItem('2048best',best);}
      document.getElementById('sc').textContent=score;
      document.getElementById('best').textContent=best;
    }

    function checkEnd() {
      const max=Math.max(...grid.flat());
      if(max>=2048) {
        const s=document.getElementById('status');
        s.textContent='🎉 You reached 2048! Keep going!';
        s.className='status-msg status-win';
      }
      // Check if no moves left
      for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
        if(!grid[r][c]) return;
        if(r<3&&grid[r][c]===grid[r+1][c]) return;
        if(c<3&&grid[r][c]===grid[r][c+1]) return;
      }
      const s=document.getElementById('status');
      s.textContent='💀 No moves left! Game over.';
      s.className='status-msg status-lose';
    }

    document.addEventListener('keydown',e=>{
      const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
      if(m[e.key]){e.preventDefault();move(m[e.key]);}
    });

    // Touch support
    let tx,ty;
    document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
    document.getElementById('board').addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
      if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
      else move(dy>0?'down':'up');
    });

    initGame();
  </script>
</body>
</html>
