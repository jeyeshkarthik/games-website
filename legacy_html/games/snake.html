<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake — GameZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    canvas {
      border: 2px solid var(--border);
      border-radius: 16px;
      background: #0a0a18;
      display: block;
    }
    .snake-wrap { display:flex; flex-direction:column; align-items:center; gap:20px; }
    .d-pad {
      display: grid;
      grid-template-areas: ". u ." "l . r" ". d .";
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 6px;
    }
    .d-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-size: 20px;
      cursor: pointer; display:flex; align-items:center; justify-content:center;
      transition: all 0.15s;
    }
    .d-btn:active { background: var(--surface-hover); transform: scale(0.92); }
    .d-btn[data-dir="UP"] { grid-area: u; }
    .d-btn[data-dir="DOWN"] { grid-area: d; }
    .d-btn[data-dir="LEFT"] { grid-area: l; }
    .d-btn[data-dir="RIGHT"] { grid-area: r; }
    .speed-bar { display:flex; gap:8px; }
    .sp-btn {
      padding:8px 20px;border-radius:100px;
      border:1px solid var(--border); background:var(--surface);
      color:var(--text-muted); cursor:pointer; font-family:var(--font);
      font-size:13px; font-weight:600; transition:all 0.2s;
    }
    .sp-btn.active { background:var(--gradient); color:#fff; border-color:transparent; }
    .overlay {
      position:absolute; inset:0; border-radius:14px;
      background:rgba(8,8,24,0.85);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; backdrop-filter:blur(4px);
    }
    .canvas-wrap { position:relative; }
    .overlay h2 { font-size:32px; font-weight:800; }
    .overlay .final-score { color:var(--text-muted); font-size:16px; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="game-page">
    <div class="game-header">
      <a href="../index.html" class="back-btn">← Back</a>
      <div class="game-title-wrap">
        <h1>🐍 Snake</h1>
        <p>Eat apples, don't crash!</p>
      </div>
      <div class="score-display">
        <div class="score-box"><span class="s-label">Score</span><span class="s-val" id="sc">0</span></div>
        <div class="score-box"><span class="s-label">Best</span><span class="s-val" id="best">0</span></div>
      </div>
    </div>

    <div class="speed-bar">
      <button class="sp-btn" onclick="setSpeed(200)">Slow</button>
      <button class="sp-btn active" onclick="setSpeed(120)">Normal</button>
      <button class="sp-btn" onclick="setSpeed(70)">Fast</button>
    </div>

    <div class="snake-wrap">
      <div class="canvas-wrap">
        <canvas id="canvas" width="420" height="420"></canvas>
        <div class="overlay" id="overlay">
          <h2>🐍 Snake</h2>
          <p class="final-score">Use arrow keys or D-pad to move</p>
          <button class="btn btn-primary" onclick="startGame()">Start Game</button>
        </div>
      </div>

      <div class="d-pad">
        <button class="d-btn" data-dir="UP" onclick="changeDir('UP')">▲</button>
        <button class="d-btn" data-dir="LEFT" onclick="changeDir('LEFT')">◀</button>
        <button class="d-btn" data-dir="RIGHT" onclick="changeDir('RIGHT')">▶</button>
        <button class="d-btn" data-dir="DOWN" onclick="changeDir('DOWN')">▼</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const GRID = 20, COLS = 21, ROWS = 21;
    let snake, dir, nextDir, food, score, best = 0, interval, speed = 120, running = false;

    function setSpeed(s) {
      speed = s;
      document.querySelectorAll('.sp-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      if (running) { clearInterval(interval); interval = setInterval(tick, speed); }
    }

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      snake = [{x:10, y:10}, {x:9,y:10}, {x:8,y:10}];
      dir = 'RIGHT'; nextDir = 'RIGHT';
      score = 0; running = true;
      placeFood();
      updateScore();
      clearInterval(interval);
      interval = setInterval(tick, speed);
    }

    function placeFood() {
      do {
        food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
      } while (snake.some(s => s.x===food.x && s.y===food.y));
    }

    function changeDir(d) {
      const opp = {UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
      if (d !== opp[dir]) nextDir = d;
    }

    function tick() {
      dir = nextDir;
      const head = {...snake[0]};
      if (dir==='UP') head.y--;
      if (dir==='DOWN') head.y++;
      if (dir==='LEFT') head.x--;
      if (dir==='RIGHT') head.x++;

      if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
        endGame(); return;
      }

      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) {
        score += 10; updateScore(); placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let i=0;i<=COLS;i++) { ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,canvas.height); ctx.stroke(); }
      for (let i=0;i<=ROWS;i++) { ctx.beginPath(); ctx.moveTo(0,i*GRID); ctx.lineTo(canvas.width,i*GRID); ctx.stroke(); }
      // Food
      ctx.fillStyle = '#ef4444';
      ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(food.x*GRID+GRID/2, food.y*GRID+GRID/2, GRID/2-2, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Snake
      snake.forEach((seg, i) => {
        const t = i/snake.length;
        ctx.fillStyle = i===0 ? '#10b981' : `hsl(${160-t*40}, 80%, ${50-t*15}%)`;
        ctx.shadowColor = i===0 ? '#10b981' : 'transparent';
        ctx.shadowBlur = i===0 ? 16 : 0;
        ctx.beginPath();
        ctx.roundRect(seg.x*GRID+1, seg.y*GRID+1, GRID-2, GRID-2, i===0?8:4);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
      // Eyes on head
      const h = snake[0];
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(h.x*GRID+6, h.y*GRID+6, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(h.x*GRID+14, h.y*GRID+6, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(h.x*GRID+7, h.y*GRID+7, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(h.x*GRID+15, h.y*GRID+7, 1.5, 0, Math.PI*2); ctx.fill();
    }

    function endGame() {
      clearInterval(interval); running = false;
      if (score > best) best = score;
      document.getElementById('best').textContent = best;
      const ov = document.getElementById('overlay');
      ov.innerHTML = `<h2>💀 Game Over</h2><p class="final-score">Score: ${score} | Best: ${best}</p><button class="btn btn-primary" onclick="startGame()">Play Again</button>`;
      ov.style.display = 'flex';
    }

    function updateScore() {
      document.getElementById('sc').textContent = score;
    }

    document.addEventListener('keydown', e => {
      const map = {ArrowUp:'UP',ArrowDown:'DOWN',ArrowLeft:'LEFT',ArrowRight:'RIGHT'};
      if (map[e.key]) { e.preventDefault(); changeDir(map[e.key]); }
      if (e.key===' ' && !running) startGame();
    });

    // Draw empty grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let i=0;i<=COLS;i++) { ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,canvas.height); ctx.stroke(); }
    for (let i=0;i<=ROWS;i++) { ctx.beginPath(); ctx.moveTo(0,i*GRID); ctx.lineTo(canvas.width,i*GRID); ctx.stroke(); }
  </script>
</body>
</html>
