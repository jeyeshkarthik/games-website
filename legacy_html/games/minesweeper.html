<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minesweeper — GameZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .ms-board { display:grid; gap:3px; max-width:560px; width:100%; }
    .ms-cell {
      aspect-ratio:1; border-radius:8px;
      border: 1px solid var(--border);
      background: var(--surface);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.15s;
      user-select:none;
    }
    .ms-cell:hover:not(.open):not(.flagged) { background:var(--surface-hover); transform:scale(1.05); }
    .ms-cell.open {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.04);
      cursor:default;
    }
    .ms-cell.mine { background:rgba(239,68,68,0.2); border-color:#ef4444; }
    .ms-cell.flagged { background:rgba(245,158,11,0.1); border-color:rgba(245,158,11,0.4); }
    .ms-cell.flagged::before { content:'🚩'; font-size:14px; }
    .ms-cell.safe-reveal { animation: safeFlash 0.3s ease; }
    @keyframes safeFlash { 0%,100%{background:var(--surface)} 50%{background:rgba(16,185,129,0.15)} }
    .n1{color:#6ee7b7} .n2{color:#60a5fa} .n3{color:#f87171}
    .n4{color:#818cf8} .n5{color:#fb923c} .n6{color:#34d399}
    .n7{color:#f472b6} .n8{color:#94a3b8}
    .ms-header { display:flex; justify-content:space-between; align-items:center; max-width:560px; width:100%; margin-bottom:16px; }
    .ms-stat { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 20px; text-align:center; }
    .ms-stat .val { font-size:22px; font-weight:800; }
    .ms-stat .lbl { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
    .diff-row { display:flex; gap:8px; margin-bottom:20px; }
    .diff-b { padding:8px 20px; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; font-family:var(--font); font-size:13px; font-weight:600; transition:all 0.2s; }
    .diff-b.active { background:var(--gradient); color:#fff; border-color:transparent; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="game-page">
    <div class="game-header">
      <a href="../index.html" class="back-btn">← Back</a>
      <div class="game-title-wrap">
        <h1>💣 Minesweeper</h1>
        <p>Right-click to flag · Click to reveal</p>
      </div>
      <div class="score-display">
        <div class="score-box"><span class="s-label">Best</span><span class="s-val" id="best">—</span></div>
      </div>
    </div>

    <div class="diff-row">
      <button class="diff-b active" onclick="setDiff(9,9,10,'Easy')">Easy</button>
      <button class="diff-b" onclick="setDiff(12,12,25,'Medium')">Medium</button>
      <button class="diff-b" onclick="setDiff(16,16,50,'Hard')">Hard</button>
    </div>

    <div class="ms-header">
      <div class="ms-stat"><div class="val" id="mine-count">💣</div><div class="lbl">Mines</div></div>
      <div class="status-msg" id="status" style="flex:1;margin:0 16px">Click to reveal!</div>
      <div class="ms-stat"><div class="val" id="timer-val">0s</div><div class="lbl">Time</div></div>
    </div>

    <div class="ms-board" id="board"></div>

    <button class="btn btn-primary" style="margin-top:24px" onclick="initGame()">New Game</button>
  </div>

  <script>
    let ROWS=9, COLS=9, MINES=10;
    let grid, revealed, flagged, gameOver, started, timerInt, elapsed, bests={};

    function setDiff(r,c,m,name) {
      ROWS=r; COLS=c; MINES=m;
      document.querySelectorAll('.diff-b').forEach(b=>b.classList.remove('active'));
      event.target.classList.add('active');
      initGame();
    }

    function initGame() {
      clearInterval(timerInt); elapsed=0; started=false;
      gameOver=false;
      grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
      revealed=Array.from({length:ROWS},()=>Array(COLS).fill(false));
      flagged=Array.from({length:ROWS},()=>Array(COLS).fill(false));
      document.getElementById('timer-val').textContent='0s';
      document.getElementById('mine-count').textContent='💣 '+MINES;
      document.getElementById('status').textContent='Click to reveal!';
      document.getElementById('status').className='status-msg';
      renderBoard();
    }

    function placeMines(firstR, firstC) {
      let placed=0;
      while(placed<MINES) {
        const r=Math.floor(Math.random()*ROWS), c=Math.floor(Math.random()*COLS);
        if(grid[r][c]===-1) continue;
        if(Math.abs(r-firstR)<=1 && Math.abs(c-firstC)<=1) continue;
        grid[r][c]=-1; placed++;
      }
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
        if(grid[r][c]===-1) continue;
        let cnt=0;
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
          if(r+dr>=0&&r+dr<ROWS&&c+dc>=0&&c+dc<COLS&&grid[r+dr][c+dc]===-1) cnt++;
        }
        grid[r][c]=cnt;
      }
    }

    function renderBoard() {
      const board=document.getElementById('board');
      board.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
      board.innerHTML='';
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
        const cell=document.createElement('div');
        cell.className='ms-cell';
        cell.dataset.r=r; cell.dataset.c=c;
        if(revealed[r][c]) {
          cell.classList.add('open');
          if(grid[r][c]===-1) { cell.textContent='💣'; cell.classList.add('mine'); }
          else if(grid[r][c]>0) { cell.textContent=grid[r][c]; cell.classList.add('n'+grid[r][c]); }
        } else if(flagged[r][c]) {
          cell.classList.add('flagged');
        }
        cell.addEventListener('click',()=>click(r,c));
        cell.addEventListener('contextmenu',e=>{e.preventDefault();flag(r,c);});
        board.appendChild(cell);
      }
    }

    function click(r,c) {
      if(gameOver||revealed[r][c]||flagged[r][c]) return;
      if(!started) {
        started=true; placeMines(r,c);
        timerInt=setInterval(()=>{ elapsed++; document.getElementById('timer-val').textContent=elapsed+'s'; },1000);
      }
      if(grid[r][c]===-1) { reveal(r,c); explode(r,c); return; }
      floodReveal(r,c);
      renderBoard();
      checkWin();
    }

    function floodReveal(r,c) {
      if(r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c]) return;
      revealed[r][c]=true;
      if(grid[r][c]===0) {
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) floodReveal(r+dr,c+dc);
      }
    }

    function reveal(r,c) { revealed[r][c]=true; }

    function flag(r,c) {
      if(gameOver||revealed[r][c]) return;
      flagged[r][c]=!flagged[r][c];
      const flags=flagged.flat().filter(Boolean).length;
      document.getElementById('mine-count').textContent='💣 '+(MINES-flags);
      renderBoard();
    }

    function explode(r,c) {
      clearInterval(timerInt); gameOver=true;
      // Reveal all mines
      for(let ri=0;ri<ROWS;ri++) for(let ci=0;ci<COLS;ci++) {
        if(grid[ri][ci]===-1) revealed[ri][ri===r&&ci===c?ri:ri][ci]=true;
      }
      for(let ri=0;ri<ROWS;ri++) for(let ci=0;ci<COLS;ci++) {
        if(grid[ri][ci]===-1) revealed[ri][ci]=true;
      }
      renderBoard();
      const s=document.getElementById('status');
      s.textContent='💥 BOOM! Game over!'; s.className='status-msg status-lose';
    }

    function checkWin() {
      let total=ROWS*COLS, revCount=revealed.flat().filter(Boolean).length;
      if(revCount===total-MINES) {
        clearInterval(timerInt); gameOver=true;
        const key=ROWS+'x'+COLS;
        if(!bests[key]||elapsed<bests[key]) bests[key]=elapsed;
        document.getElementById('best').textContent=bests[key]+'s';
        const s=document.getElementById('status');
        s.textContent=`🎉 You won in ${elapsed}s!`; s.className='status-msg status-win';
      }
    }

    initGame();
  </script>
</body>
</html>
